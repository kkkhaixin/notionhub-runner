              raise SystemExit('运行配置超过大小限制。')
          metadata_start = len(magic) + 8
          metadata_end = metadata_start + metadata_length
          if metadata_end >= len(raw):
              raise SystemExit('运行程序响应不完整。')
          try:
              metadata = json.loads(raw[metadata_start:metadata_end].decode('utf-8'))
          except Exception:
              raise SystemExit('运行配置格式无效。')
          archive = raw[metadata_end:]
          if metadata.get('schemaVersion') != 1:
              raise SystemExit('运行配置版本不受支持。')
          if metadata.get('context', {}).get('service') != expected_service:
              raise SystemExit('运行配置与当前服务不匹配。')
          expected_size = metadata.get('bundle', {}).get('size')
          if not isinstance(expected_size, int) or expected_size != len(archive) or not archive or len(archive) > 64 * 1024 * 1024:
              raise SystemExit('运行程序大小校验失败。')
          for path, data in ((metadata_path, json.dumps(metadata, ensure_ascii=False, separators=(',', ':')).encode()), (archive_path, archive)):
              with open(path, 'wb') as handle:
                  handle.write(data)
              os.chmod(path, 0o600)
          PY
          ACCESS_TOKEN=$(jq -r '.accessToken // empty' "$RUNTIME_METADATA")
          REPORT_TOKEN=$(jq -r '.reportToken // empty' "$RUNTIME_METADATA")
          POLICY_ID=$(jq -r '.context.id // empty' "$RUNTIME_METADATA")
          PLAN=$(jq -r '.context.plan // empty' "$RUNTIME_METADATA")
          POLICY_JSON=$(jq -c '.policy // {}' "$RUNTIME_METADATA")
          POLICY_SIGNATURE=$(jq -r '.policySignature // empty' "$RUNTIME_METADATA")
          SERVICE_CONFIG=$(jq -c '.serviceConfig // empty' "$RUNTIME_METADATA")
          EXPECTED_SIZE=$(jq -r '.bundle.size // empty' "$RUNTIME_METADATA")
          EXPECTED_SHA256=$(jq -r '.bundle.sha256 // empty' "$RUNTIME_METADATA")
          if [ -z "$ACCESS_TOKEN" ] || [ -z "$REPORT_TOKEN" ] || [ -z "$POLICY_ID" ] || [ -z "$PLAN" ] || [ -z "$POLICY_SIGNATURE" ] || [ -z "$SERVICE_CONFIG" ] || [ -z "$EXPECTED_SIZE" ] || [ -z "$EXPECTED_SHA256" ]; then
            echo "::error title=运行准备失败::运行配置缺少必要字段。"
            exit 1
