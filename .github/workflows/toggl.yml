          cleanup_runtime_files() { rm -f "$RUNTIME_RESPONSE" "$RUNTIME_METADATA" "$RUNTIME_ARCHIVE"; }
          trap cleanup_runtime_files EXIT
          HTTP_STATUS=$(curl -sS -o "$RUNTIME_RESPONSE" -w '%{http_code}' -X POST "$NOTIONHUB_API_BASE/github/runner/runtime-bundle"             -H "Authorization: Bearer $OIDC_TOKEN" -H 'Content-Type: application/json' --data "$RUNTIME_PAYLOAD")
          if [ "$HTTP_STATUS" = "418" ]; then
            echo "免费体验次数已用完，请购买激活码。"
            echo "获取激活码：https://www.notionhub.app/docs/get-activation-code.html"
            {
              echo "## 免费体验次数已用完"
              echo ""
              echo "请购买激活码并在 NotionHub 插件中完成激活后重新同步。"
              echo ""
              echo "[查看如何获取激活码](https://www.notionhub.app/docs/get-activation-code.html)"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=免费体验次数已用完::免费体验次数已用完，请购买激活码并在 NotionHub 插件中完成激活后重新同步。%0A%0A获取激活码：https://www.notionhub.app/docs/get-activation-code.html"
            exit 1
          fi
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            MESSAGE=$(jq -r '.message // "运行准备失败"' "$RUNTIME_RESPONSE" 2>/dev/null || echo "运行准备失败")
            echo "::error title=运行准备失败::$MESSAGE"
            exit 1
          fi
          chmod 600 "$RUNTIME_RESPONSE"
          python3 - "$RUNTIME_RESPONSE" "$RUNTIME_METADATA" "$RUNTIME_ARCHIVE" "toggl" <<'PY'
          import json
          import os
          import re
          import sys

          source, metadata_path, archive_path, expected_service = sys.argv[1:]
          raw = open(source, 'rb').read()
          magic = b'NHRB1\n'
