          ACTUAL_SHA256=$(sha256sum "$RUNTIME_ARCHIVE" | awk '{print $1}')
          if [ "$ACTUAL_SIZE" != "$EXPECTED_SIZE" ] || [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "::error title=运行程序校验失败::下载内容的大小或 SHA-256 不匹配。"
            exit 1
          fi
          if tar -tzf "$RUNTIME_ARCHIVE" | grep -Eq '(^/|(^|/)\.\.(/|$))'; then
            echo "::error title=运行程序校验失败::运行程序包含不安全路径。"
            exit 1
          fi
          tar -xzf "$RUNTIME_ARCHIVE"
          test -f runner/requirements.txt
          test -d runner/notionhub_runner
          {
            echo "NOTIONHUB_RUN_ACCESS_TOKEN=$ACCESS_TOKEN"
            echo "NOTIONHUB_REPORT_TOKEN=$REPORT_TOKEN"
            echo "NOTIONHUB_POLICY_ID=$POLICY_ID"
            echo "SYNC_RUN_ID=$POLICY_ID"
            echo "SYNC_PLAN=$PLAN"
            echo "ENTITLEMENT_PLAN=$PLAN"
            echo "SYNC_POLICY_JSON=$POLICY_JSON"
            echo "SYNC_POLICY_SIGNATURE=$POLICY_SIGNATURE"
            echo "SYNC_POLICY_SIGNING_KEY=$ACCESS_TOKEN"
            echo 'TOGGL_CONFIG<<NOTIONHUB_CONFIG_EOF'
            echo "$SERVICE_CONFIG"
            echo 'NOTIONHUB_CONFIG_EOF'
          } >> "$GITHUB_ENV"
          echo "plan=$PLAN" >> "$GITHUB_OUTPUT"

      - name: 配置 Python 环境
        if: steps.job_config.outputs.enabled == 'true' && steps.authorize.outcome == 'success'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装运行依赖
        id: install
        if: steps.job_config.outputs.enabled == 'true' && steps.authorize.outcome == 'success'
        run: |
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          if [ -f runner/requirements.txt ]; then pip install --quiet --disable-pip-version-check -r runner/requirements.txt; fi
          SERVICE_REQUIREMENTS=$(cd runner && python -m notionhub_runner requirements toggl)
          if [ -f "$SERVICE_REQUIREMENTS" ]; then pip install --quiet --disable-pip-version-check -r "$SERVICE_REQUIREMENTS"; fi

      - name: 同步时间记录
        id: sync
        if: steps.job_config.outputs.enabled == 'true' && steps.install.outcome == 'success'
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          RAW_ACTION_PAYLOAD: ${{ github.event.inputs.payload || '{}' }}
          INPUT_SYNC_MODE: ${{ github.event.inputs.sync_mode || '' }}
          SUPPORTS_FULL_SYNC: 'true'
          INPUT_REPAIR_AFTER_SYNC: ${{ github.event.inputs.repair_after_sync || '' }}
          NOTIONHUB_DEFER_FILES: 'true'
        run: |
          REQUESTED_SYNC_MODE=$(jq -nr --arg raw "$RAW_ACTION_PAYLOAD" --arg input "$INPUT_SYNC_MODE" '($raw | fromjson? // {}) as $payload | ($payload.requestedSyncMode // $payload.syncMode // $payload.sync_mode // "") as $payload_mode | (if $payload_mode == "full" or $payload_mode == "incremental" then $payload_mode elif $input == "full" or $input == "incremental" then $input else "incremental" end)')
          CONFIG_INITIAL_FULL_SYNC_REQUIRED=$(printf '%s' "$TOGGL_CONFIG" | jq -r '(.TOGGL_INITIAL_FULL_SYNC_REQUIRED // false) | tostring' 2>/dev/null || echo "false")
          PAYLOAD_INITIAL_FULL_SYNC_REQUIRED=$(jq -nr --arg raw "$RAW_ACTION_PAYLOAD" '($raw | fromjson? // {}) | (.initialFullSyncForced // false) | tostring')
          if [ "$CONFIG_INITIAL_FULL_SYNC_REQUIRED" = "true" ] || [ "$PAYLOAD_INITIAL_FULL_SYNC_REQUIRED" = "true" ]; then
            EFFECTIVE_SYNC_MODE=full
            INITIAL_FULL_SYNC_FORCED=true
          else
            EFFECTIVE_SYNC_MODE="$REQUESTED_SYNC_MODE"
            INITIAL_FULL_SYNC_FORCED=false
          fi
          ACTION_PAYLOAD=$(jq -cn --arg raw "$RAW_ACTION_PAYLOAD" --arg requested "$REQUESTED_SYNC_MODE" --arg effective "$EFFECTIVE_SYNC_MODE" --arg forced "$INITIAL_FULL_SYNC_FORCED" '($raw | fromjson? // {}) + {requestedSyncMode:$requested,syncMode:$effective,sync_mode:$effective,effectiveSyncMode:$effective,initialFullSyncForced:($forced == "true")}')
          if [ "$INITIAL_FULL_SYNC_FORCED" = "true" ]; then
            ACTION_PAYLOAD=$(printf '%s' "$ACTION_PAYLOAD" | jq -c '. + {repair:true,repair_after_sync:true,runSafeRepairAfterSync:true}')
          elif [ "$INPUT_REPAIR_AFTER_SYNC" = "true" ] || [ "$INPUT_REPAIR_AFTER_SYNC" = "false" ]; then
            ACTION_PAYLOAD=$(printf '%s' "$ACTION_PAYLOAD" | jq -c --arg value "$INPUT_REPAIR_AFTER_SYNC" '. + {repair_after_sync:($value == "true"),runSafeRepairAfterSync:($value == "true")}')
          fi
          {
            echo "NOTIONHUB_ACTION_PAYLOAD=$ACTION_PAYLOAD"
            echo "NOTIONHUB_REQUESTED_SYNC_MODE=$REQUESTED_SYNC_MODE"
            echo "NOTIONHUB_EFFECTIVE_SYNC_MODE=$EFFECTIVE_SYNC_MODE"
            echo "NOTIONHUB_INITIAL_FULL_SYNC_FORCED=$INITIAL_FULL_SYNC_FORCED"
          } >> "$GITHUB_ENV"
          export NOTIONHUB_ACTION_PAYLOAD="$ACTION_PAYLOAD"
          if [ "$SYNC_PLAN" = "trial" ] && [ "$EFFECTIVE_SYNC_MODE" = "full" ]; then
            echo "::error title=免费体验不支持全量更新::请激活后再执行全量更新。"
            exit 1
          fi
          if [ "$EFFECTIVE_SYNC_MODE" = "full" ] && [ "$SUPPORTS_FULL_SYNC" != "true" ]; then
            echo "::error title=全量更新不可用::Toggl 暂不支持全量更新，请改用普通同步。"
            exit 1
          fi
          cd runner
          python -m notionhub_runner sync toggl --job data

      - name: 记录同步时间记录结果
        if: always()
        run: |
          if [ "${{ steps.restore.outcome }}" != "success" ] || [ "${{ steps.job_config.outcome }}" != "success" ]; then
            if [ "false" = "true" ]; then STATUS=warning; else STATUS=failure; fi
          elif [ "${{ steps.job_config.outputs.enabled }}" != "true" ]; then
            STATUS=skipped
          elif [ "${{ steps.sync.outcome }}" = "success" ]; then
            STATUS=success
          elif [ "false" = "true" ]; then
            STATUS=warning
            echo "::warning title=同步时间记录未完成::主同步结果不受影响，可稍后重试此辅助阶段。"
          else
            STATUS=failure
          fi
          if [ ! -f "$SYNC_POLICY_STATE_PATH" ]; then printf '{}' > "$SYNC_POLICY_STATE_PATH"; fi
          jq -cn             --arg jobKey "data"             --arg label "同步时间记录"             --arg status "$STATUS"             --arg failureClass "${NOTIONHUB_FAILURE_CLASS:-}"             --argjson stageIndex 1             --argjson required true             '{stageIndex:$stageIndex,jobKey:$jobKey,label:$label,status:$status,required:$required,failureClass:(if ($failureClass | length) > 0 then $failureClass else null end)}'             > "${{ github.workspace }}/notionhub-stage-01.json"

      - name: 保存同步时间记录进度
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notionhub-toggl-01-data-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.SYNC_POLICY_STATE_PATH }}
            ${{ env.SYNC_POLICY_CONTINUATION_PATH }}
            ${{ env.NOTIONHUB_RUN_META_PATH }}
            ${{ github.workspace }}/notionhub-stage-01.json
          if-no-files-found: error
          retention-days: 1

      - name: 确认同步时间记录成功
        if: always() && steps.job_config.outputs.enabled == 'true'
        run: |
          if [ "${{ steps.sync.outcome }}" != "success" ]; then exit 1; fi


  heatmap:
    name: 更新热力图
    needs: [prepare, data]
    if: needs.prepare.outputs.enabled == 'true' && needs.data.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TOGGL_CONFIG: ${{ secrets.TOGGL_CONFIG }}
      NOTIONHUB_API_BASE: https://i.notionhub.app/v1
      NOTIONHUB_SERVICE: toggl
      NOTIONHUB_CONFIG_VERSION: '28'
      SYNC_POLICY_STATE_PATH: ${{ github.workspace }}/notionhub-state.json
      SYNC_POLICY_CONTINUATION_PATH: ${{ github.workspace }}/notionhub-continuation-id
      SYNC_POLICY_REPORT_PATH: ${{ github.workspace }}/notionhub-service-report.json
      NOTIONHUB_RUN_META_PATH: ${{ github.workspace }}/notionhub-run-meta.json
    steps:
      - name: 恢复上一阶段进度
        id: restore
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: notionhub-toggl-01-data-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}

      - name: 检查更新热力图配置
        id: job_config
        continue-on-error: true
        run: |
          SERVICE_CONFIG='${{ secrets.TOGGL_CONFIG }}'
          PLAN=$(printf '%s' "$SERVICE_CONFIG" | jq -r '.TOGGL_SYNC_PLAN // "lifetime"')
          JOB_ENABLED=true
          SKIP_REASON=""

          echo "enabled=$JOB_ENABLED" >> "$GITHUB_OUTPUT"
          echo "plan=$PLAN" >> "$GITHUB_OUTPUT"
          if [ "$JOB_ENABLED" != "true" ]; then
            echo "::notice title=更新热力图已跳过::$SKIP_REASON"
          fi

      - name: 验证权限并获取运行程序
        id: authorize
        continue-on-error: true
        if: steps.job_config.outputs.enabled == 'true'
        run: |
          OIDC_TOKEN=$(curl -fsSL -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https%3A%2F%2Fi.notionhub.app" | jq -r '.value // empty')
          if [ -z "$OIDC_TOKEN" ]; then
            echo "::error title=GitHub 身份验证失败::未能获取本次运行的 OIDC token。"
            exit 1
          fi
          echo "::add-mask::$OIDC_TOKEN"
          CONTINUATION_ID="$(cat "$SYNC_POLICY_CONTINUATION_PATH")"
          if [ -z "$CONTINUATION_ID" ]; then
            echo "::error title=运行授权续接失败::同步进度中缺少续接标识。"
            exit 1
          fi
          RUNTIME_PAYLOAD=$(jq -cn --arg service "toggl" --arg continuation "$CONTINUATION_ID" '{service:$service,purpose:"sync",continuationPolicyId:$continuation}')
          RUNTIME_RESPONSE="$RUNNER_TEMP/notionhub-runtime-bundle.bin"
          RUNTIME_METADATA="$RUNNER_TEMP/notionhub-runtime-metadata.json"
          RUNTIME_ARCHIVE="$RUNNER_TEMP/notionhub-runner.tar.gz"
          cleanup_runtime_files() { rm -f "$RUNTIME_RESPONSE" "$RUNTIME_METADATA" "$RUNTIME_ARCHIVE"; }
          trap cleanup_runtime_files EXIT
          HTTP_STATUS=$(curl -sS -o "$RUNTIME_RESPONSE" -w '%{http_code}' -X POST "$NOTIONHUB_API_BASE/github/runner/runtime-bundle"             -H "Authorization: Bearer $OIDC_TOKEN" -H 'Content-Type: application/json' --data "$RUNTIME_PAYLOAD")
          if [ "$HTTP_STATUS" = "418" ]; then
            echo "免费体验次数已用完，请购买激活码。"
            echo "获取激活码：https://www.notionhub.app/docs/get-activation-code.html"
            {
              echo "## 免费体验次数已用完"
              echo ""
              echo "请购买激活码并在 NotionHub 插件中完成激活后重新同步。"
              echo ""
              echo "[查看如何获取激活码](https://www.notionhub.app/docs/get-activation-code.html)"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=免费体验次数已用完::免费体验次数已用完，请购买激活码并在 NotionHub 插件中完成激活后重新同步。%0A%0A获取激活码：https://www.notionhub.app/docs/get-activation-code.html"
            exit 1
          fi
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            MESSAGE=$(jq -r '.message // "运行准备失败"' "$RUNTIME_RESPONSE" 2>/dev/null || echo "运行准备失败")
            echo "::error title=运行准备失败::$MESSAGE"
            exit 1
          fi
          chmod 600 "$RUNTIME_RESPONSE"
          python3 - "$RUNTIME_RESPONSE" "$RUNTIME_METADATA" "$RUNTIME_ARCHIVE" "toggl" <<'PY'
          import json
          import os
          import re
          import sys

          source, metadata_path, archive_path, expected_service = sys.argv[1:]
          raw = open(source, 'rb').read()
          magic = b'NHRB1\n'
          if not raw.startswith(magic) or len(raw) < len(magic) + 8:
              raise SystemExit('运行程序响应格式无效。')
          length_bytes = raw[len(magic):len(magic) + 8]
          if not re.fullmatch(rb'[0-9a-fA-F]{8}', length_bytes):
              raise SystemExit('运行配置长度无效。')
          metadata_length = int(length_bytes, 16)
          if metadata_length <= 0 or metadata_length > 1024 * 1024:
              raise SystemExit('运行配置超过大小限制。')
          metadata_start = len(magic) + 8
          metadata_end = metadata_start + metadata_length
          if metadata_end >= len(raw):
              raise SystemExit('运行程序响应不完整。')
          try:
              metadata = json.loads(raw[metadata_start:metadata_end].decode('utf-8'))
          except Exception:
              raise SystemExit('运行配置格式无效。')
          archive = raw[metadata_end:]
          if metadata.get('schemaVersion') != 1:
              raise SystemExit('运行配置版本不受支持。')
          if metadata.get('context', {}).get('service') != expected_service:
              raise SystemExit('运行配置与当前服务不匹配。')
          expected_size = metadata.get('bundle', {}).get('size')
          if not isinstance(expected_size, int) or expected_size != len(archive) or not archive or len(archive) > 64 * 1024 * 1024:
              raise SystemExit('运行程序大小校验失败。')
          for path, data in ((metadata_path, json.dumps(metadata, ensure_ascii=False, separators=(',', ':')).encode()), (archive_path, archive)):
              with open(path, 'wb') as handle:
                  handle.write(data)
              os.chmod(path, 0o600)
          PY
          ACCESS_TOKEN=$(jq -r '.accessToken // empty' "$RUNTIME_METADATA")
          REPORT_TOKEN=$(jq -r '.reportToken // empty' "$RUNTIME_METADATA")
          POLICY_ID=$(jq -r '.context.id // empty' "$RUNTIME_METADATA")
          PLAN=$(jq -r '.context.plan // empty' "$RUNTIME_METADATA")
          POLICY_JSON=$(jq -c '.policy // {}' "$RUNTIME_METADATA")
          POLICY_SIGNATURE=$(jq -r '.policySignature // empty' "$RUNTIME_METADATA")
          SERVICE_CONFIG=$(jq -c '.serviceConfig // empty' "$RUNTIME_METADATA")
          EXPECTED_SIZE=$(jq -r '.bundle.size // empty' "$RUNTIME_METADATA")
          EXPECTED_SHA256=$(jq -r '.bundle.sha256 // empty' "$RUNTIME_METADATA")
          if [ -z "$ACCESS_TOKEN" ] || [ -z "$REPORT_TOKEN" ] || [ -z "$POLICY_ID" ] || [ -z "$PLAN" ] || [ -z "$POLICY_SIGNATURE" ] || [ -z "$SERVICE_CONFIG" ] || [ -z "$EXPECTED_SIZE" ] || [ -z "$EXPECTED_SHA256" ]; then
            echo "::error title=运行准备失败::运行配置缺少必要字段。"
            exit 1
          fi
          for VALUE in "$ACCESS_TOKEN" "$REPORT_TOKEN" "$POLICY_SIGNATURE" "$SERVICE_CONFIG"; do echo "::add-mask::$VALUE"; done
          python3 - "$RUNTIME_METADATA" <<'PY'
          import json
          import sys
          metadata = json.load(open(sys.argv[1], encoding='utf-8'))
          for value in metadata.get('serviceConfig', {}).values():
              escaped = str(value).replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A')
              if len(escaped) >= 8:
                  print(f'::add-mask::{escaped}')
          PY
          ACTUAL_SIZE=$(wc -c < "$RUNTIME_ARCHIVE" | tr -d ' ')
          ACTUAL_SHA256=$(sha256sum "$RUNTIME_ARCHIVE" | awk '{print $1}')
          if [ "$ACTUAL_SIZE" != "$EXPECTED_SIZE" ] || [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "::error title=运行程序校验失败::下载内容的大小或 SHA-256 不匹配。"
            exit 1
          fi
          if tar -tzf "$RUNTIME_ARCHIVE" | grep -Eq '(^/|(^|/)\.\.(/|$))'; then
            echo "::error title=运行程序校验失败::运行程序包含不安全路径。"
            exit 1
          fi
          tar -xzf "$RUNTIME_ARCHIVE"
          test -f runner/requirements.txt
          test -d runner/notionhub_runner
          {
            echo "NOTIONHUB_RUN_ACCESS_TOKEN=$ACCESS_TOKEN"
            echo "NOTIONHUB_REPORT_TOKEN=$REPORT_TOKEN"
            echo "NOTIONHUB_POLICY_ID=$POLICY_ID"
            echo "SYNC_RUN_ID=$POLICY_ID"
            echo "SYNC_PLAN=$PLAN"
            echo "ENTITLEMENT_PLAN=$PLAN"
            echo "SYNC_POLICY_JSON=$POLICY_JSON"
            echo "SYNC_POLICY_SIGNATURE=$POLICY_SIGNATURE"
            echo "SYNC_POLICY_SIGNING_KEY=$ACCESS_TOKEN"
            echo 'TOGGL_CONFIG<<NOTIONHUB_CONFIG_EOF'
            echo "$SERVICE_CONFIG"
            echo 'NOTIONHUB_CONFIG_EOF'
          } >> "$GITHUB_ENV"
          echo "plan=$PLAN" >> "$GITHUB_OUTPUT"

      - name: 配置 Python 环境
        if: steps.job_config.outputs.enabled == 'true' && steps.authorize.outcome == 'success'
        continue-on-error: true
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装运行依赖
        id: install
        if: steps.job_config.outputs.enabled == 'true' && steps.authorize.outcome == 'success'
        continue-on-error: true
        run: |
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          if [ -f runner/requirements.txt ]; then pip install --quiet --disable-pip-version-check -r runner/requirements.txt; fi
          SERVICE_REQUIREMENTS=$(cd runner && python -m notionhub_runner requirements toggl)
          if [ -f "$SERVICE_REQUIREMENTS" ]; then pip install --quiet --disable-pip-version-check -r "$SERVICE_REQUIREMENTS"; fi

      - name: 更新热力图
        id: sync
        if: steps.job_config.outputs.enabled == 'true' && steps.install.outcome == 'success'
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          RAW_ACTION_PAYLOAD: ${{ github.event.inputs.payload || '{}' }}
          INPUT_SYNC_MODE: ${{ github.event.inputs.sync_mode || '' }}
          SUPPORTS_FULL_SYNC: 'true'
          INPUT_REPAIR_AFTER_SYNC: ${{ github.event.inputs.repair_after_sync || '' }}
          NOTIONHUB_DEFER_FILES: 'true'
        run: |
          REQUESTED_SYNC_MODE=$(jq -nr --arg raw "$RAW_ACTION_PAYLOAD" --arg input "$INPUT_SYNC_MODE" '($raw | fromjson? // {}) as $payload | ($payload.requestedSyncMode // $payload.syncMode // $payload.sync_mode // "") as $payload_mode | (if $payload_mode == "full" or $payload_mode == "incremental" then $payload_mode elif $input == "full" or $input == "incremental" then $input else "incremental" end)')
          CONFIG_INITIAL_FULL_SYNC_REQUIRED=$(printf '%s' "$TOGGL_CONFIG" | jq -r '(.TOGGL_INITIAL_FULL_SYNC_REQUIRED // false) | tostring' 2>/dev/null || echo "false")
          PAYLOAD_INITIAL_FULL_SYNC_REQUIRED=$(jq -nr --arg raw "$RAW_ACTION_PAYLOAD" '($raw | fromjson? // {}) | (.initialFullSyncForced // false) | tostring')
          if [ "$CONFIG_INITIAL_FULL_SYNC_REQUIRED" = "true" ] || [ "$PAYLOAD_INITIAL_FULL_SYNC_REQUIRED" = "true" ]; then
            EFFECTIVE_SYNC_MODE=full
            INITIAL_FULL_SYNC_FORCED=true
          else
            EFFECTIVE_SYNC_MODE="$REQUESTED_SYNC_MODE"
            INITIAL_FULL_SYNC_FORCED=false
          fi
          ACTION_PAYLOAD=$(jq -cn --arg raw "$RAW_ACTION_PAYLOAD" --arg requested "$REQUESTED_SYNC_MODE" --arg effective "$EFFECTIVE_SYNC_MODE" --arg forced "$INITIAL_FULL_SYNC_FORCED" '($raw | fromjson? // {}) + {requestedSyncMode:$requested,syncMode:$effective,sync_mode:$effective,effectiveSyncMode:$effective,initialFullSyncForced:($forced == "true")}')
          if [ "$INITIAL_FULL_SYNC_FORCED" = "true" ]; then
            ACTION_PAYLOAD=$(printf '%s' "$ACTION_PAYLOAD" | jq -c '. + {repair:true,repair_after_sync:true,runSafeRepairAfterSync:true}')
          elif [ "$INPUT_REPAIR_AFTER_SYNC" = "true" ] || [ "$INPUT_REPAIR_AFTER_SYNC" = "false" ]; then
            ACTION_PAYLOAD=$(printf '%s' "$ACTION_PAYLOAD" | jq -c --arg value "$INPUT_REPAIR_AFTER_SYNC" '. + {repair_after_sync:($value == "true"),runSafeRepairAfterSync:($value == "true")}')
          fi
          {
            echo "NOTIONHUB_ACTION_PAYLOAD=$ACTION_PAYLOAD"
            echo "NOTIONHUB_REQUESTED_SYNC_MODE=$REQUESTED_SYNC_MODE"
            echo "NOTIONHUB_EFFECTIVE_SYNC_MODE=$EFFECTIVE_SYNC_MODE"
            echo "NOTIONHUB_INITIAL_FULL_SYNC_FORCED=$INITIAL_FULL_SYNC_FORCED"
          } >> "$GITHUB_ENV"
          export NOTIONHUB_ACTION_PAYLOAD="$ACTION_PAYLOAD"
          if [ "$SYNC_PLAN" = "trial" ] && [ "$EFFECTIVE_SYNC_MODE" = "full" ]; then
            echo "::error title=免费体验不支持全量更新::请激活后再执行全量更新。"
            exit 1
          fi
          if [ "$EFFECTIVE_SYNC_MODE" = "full" ] && [ "$SUPPORTS_FULL_SYNC" != "true" ]; then
            echo "::error title=全量更新不可用::Toggl 暂不支持全量更新，请改用普通同步。"
            exit 1
          fi
          cd runner
          python -m notionhub_runner sync toggl --job heatmap

      - name: 记录更新热力图结果
        if: always()
        continue-on-error: true
        run: |
          if [ "${{ steps.restore.outcome }}" != "success" ] || [ "${{ steps.job_config.outcome }}" != "success" ]; then
            if [ "true" = "true" ]; then STATUS=warning; else STATUS=failure; fi
          elif [ "${{ steps.job_config.outputs.enabled }}" != "true" ]; then
            STATUS=skipped
          elif [ "${{ steps.sync.outcome }}" = "success" ]; then
            STATUS=success
          elif [ "true" = "true" ]; then
            STATUS=warning
            echo "::warning title=更新热力图未完成::主同步结果不受影响，可稍后重试此辅助阶段。"
          else
            STATUS=failure
          fi
          if [ ! -f "$SYNC_POLICY_STATE_PATH" ]; then printf '{}' > "$SYNC_POLICY_STATE_PATH"; fi
          jq -cn             --arg jobKey "heatmap"             --arg label "更新热力图"             --arg status "$STATUS"             --arg failureClass "${NOTIONHUB_FAILURE_CLASS:-}"             --argjson stageIndex 2             --argjson required false             '{stageIndex:$stageIndex,jobKey:$jobKey,label:$label,status:$status,required:$required,failureClass:(if ($failureClass | length) > 0 then $failureClass else null end)}'             > "${{ github.workspace }}/notionhub-stage-02.json"

      - name: 保存更新热力图进度
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: notionhub-toggl-02-heatmap-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.SYNC_POLICY_STATE_PATH }}
            ${{ env.SYNC_POLICY_CONTINUATION_PATH }}
            ${{ env.NOTIONHUB_RUN_META_PATH }}
            ${{ github.workspace }}/notionhub-stage-02.json
          if-no-files-found: error
          retention-days: 1


  finish:
    name: 完成同步
    needs: [prepare, data, heatmap]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TOGGL_CONFIG: ${{ secrets.TOGGL_CONFIG }}
      NOTIONHUB_API_BASE: https://i.notionhub.app/v1
      NOTIONHUB_SERVICE: toggl
      NOTIONHUB_CONFIG_VERSION: '28'
      SYNC_POLICY_STATE_PATH: ${{ github.workspace }}/notionhub-state.json
      SYNC_POLICY_CONTINUATION_PATH: ${{ github.workspace }}/notionhub-continuation-id
      SYNC_POLICY_REPORT_PATH: ${{ github.workspace }}/notionhub-service-report.json
    steps:
      - name: 下载全部阶段结果
        if: needs.prepare.outputs.enabled == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: notionhub-toggl-*-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/notionhub-artifacts

      - name: 汇总同步结果
        id: aggregate
        env:
          PREPARE_ENABLED: ${{ needs.prepare.outputs.enabled }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          root = Path('notionhub-artifacts')
          manifests = []
          for path in root.rglob('notionhub-stage-*.json') if root.exists() else []:
              try:
                  value = json.loads(path.read_text(encoding='utf-8'))
              except Exception:
                  continue
              if isinstance(value, dict) and isinstance(value.get('stageIndex'), int):
                  manifests.append((value, path))
          required = ["data"]
          enabled = os.environ.get('PREPARE_ENABLED') == 'true'
          status_by_key = {str(item.get('jobKey')): str(item.get('status')) for item, _ in manifests}
          required_failures = [key for key in required if status_by_key.get(key) == 'failure']
          missing_required = [key for key in required if key not in status_by_key]
          if not enabled:
              status = 'skipped'
          elif required_failures or missing_required:
              status = 'failure'
          else:
              status = 'success'
          warnings = [str(item.get('jobKey')) for item, _ in manifests if item.get('status') == 'warning']
          failure_priority = {
              'platform': 0,
              'upstream': 1,
              'configuration': 2,
              'notion': 3,
              'platform_authentication': 4,
              'notion_authentication': 5,
          }
          failure_classes = [
              str(item.get('failureClass'))
              for item, _ in manifests
              if item.get('failureClass')
          ]
          failure_class = max(failure_classes, key=lambda value: failure_priority.get(value, 0), default='platform')
          stages = [item for item, _ in sorted(manifests, key=lambda pair: pair[0]['stageIndex'])]
          latest = max(manifests, key=lambda pair: pair[0]['stageIndex']) if manifests else None
          if latest:
              parent = latest[1].parent
              for name in ('notionhub-state.json', 'notionhub-continuation-id'):
                  source = parent / name
                  if source.exists():
                      shutil.copy2(source, Path(name))
          run_meta = next(iter(root.rglob('notionhub-run-meta.json')), None) if root.exists() else None
          meta = {}
          if run_meta:
              try:
                  meta = json.loads(run_meta.read_text(encoding='utf-8'))
              except Exception:
                  meta = {}
          result = {
              'status': status,
              'warnings': warnings,
              'missingRequired': missing_required,
              'failureClass': failure_class,
              'stages': stages,
              'requestedMode': str(meta.get('requestedMode') or 'incremental'),
              'effectiveMode': str(meta.get('effectiveMode') or 'incremental'),
              'initialFullSyncForced': meta.get('initialFullSyncForced') is True,
          }
          Path('notionhub-final.json').write_text(json.dumps(result, ensure_ascii=False), encoding='utf-8')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f"status={status}\n")
              output.write(f"warning_count={len(warnings)}\n")
              output.write(f"requested_mode={result['requestedMode']}\n")
              output.write(f"effective_mode={result['effectiveMode']}\n")
              output.write(f"initial_forced={str(result['initialFullSyncForced']).lower()}\n")
              output.write(f"failure_class={failure_class}\n")
              output.write(f"continuation_ready={str(Path('notionhub-continuation-id').exists()).lower()}\n")
          PY

      - name: 判断是否需要结算
        id: finish_auth
        run: |
          SERVICE_PLAN=$(printf '%s' "$TOGGL_CONFIG" | jq -r '.TOGGL_SYNC_PLAN // "lifetime"')
          NEED_AUTH=false
          SETTLE_TRIAL=false
          COMPLETE_INITIAL=false
          if [ "$SERVICE_PLAN" = "trial" ] && [ "${{ steps.aggregate.outputs.status }}" != "skipped" ]; then
            NEED_AUTH=true
            SETTLE_TRIAL=true
          fi
          if [ "$SERVICE_PLAN" = "lifetime" ] && [ "${{ steps.aggregate.outputs.status }}" = "success" ] && [ "${{ steps.aggregate.outputs.initial_forced }}" = "true" ]; then
            NEED_AUTH=true
            COMPLETE_INITIAL=true
          fi
          echo "enabled=$NEED_AUTH" >> "$GITHUB_OUTPUT"
          echo "settle_trial=$SETTLE_TRIAL" >> "$GITHUB_OUTPUT"
          echo "complete_initial=$COMPLETE_INITIAL" >> "$GITHUB_OUTPUT"

      - name: 验证权限并获取运行程序
        id: authorize
        if: steps.finish_auth.outputs.enabled == 'true'
        run: |
          OIDC_TOKEN=$(curl -fsSL -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https%3A%2F%2Fi.notionhub.app" | jq -r '.value // empty')
          if [ -z "$OIDC_TOKEN" ]; then
            echo "::error title=GitHub 身份验证失败::未能获取本次运行的 OIDC token。"
            exit 1
          fi
          echo "::add-mask::$OIDC_TOKEN"
          CONTINUATION_ID="$(cat "$SYNC_POLICY_CONTINUATION_PATH")"
          if [ -z "$CONTINUATION_ID" ]; then
            echo "::error title=运行授权续接失败::同步进度中缺少续接标识。"
            exit 1
          fi
          RUNTIME_PAYLOAD=$(jq -cn --arg service "toggl" --arg continuation "$CONTINUATION_ID" '{service:$service,purpose:"sync",continuationPolicyId:$continuation}')
          RUNTIME_RESPONSE="$RUNNER_TEMP/notionhub-runtime-bundle.bin"
          RUNTIME_METADATA="$RUNNER_TEMP/notionhub-runtime-metadata.json"
          RUNTIME_ARCHIVE="$RUNNER_TEMP/notionhub-runner.tar.gz"
          cleanup_runtime_files() { rm -f "$RUNTIME_RESPONSE" "$RUNTIME_METADATA" "$RUNTIME_ARCHIVE"; }
          trap cleanup_runtime_files EXIT
          HTTP_STATUS=$(curl -sS -o "$RUNTIME_RESPONSE" -w '%{http_code}' -X POST "$NOTIONHUB_API_BASE/github/runner/runtime-bundle"             -H "Authorization: Bearer $OIDC_TOKEN" -H 'Content-Type: application/json' --data "$RUNTIME_PAYLOAD")
          if [ "$HTTP_STATUS" = "418" ]; then
            echo "免费体验次数已用完，请购买激活码。"
            echo "获取激活码：https://www.notionhub.app/docs/get-activation-code.html"
            {
              echo "## 免费体验次数已用完"
              echo ""
              echo "请购买激活码并在 NotionHub 插件中完成激活后重新同步。"
              echo ""
              echo "[查看如何获取激活码](https://www.notionhub.app/docs/get-activation-code.html)"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=免费体验次数已用完::免费体验次数已用完，请购买激活码并在 NotionHub 插件中完成激活后重新同步。%0A%0A获取激活码：https://www.notionhub.app/docs/get-activation-code.html"
            exit 1
          fi
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            MESSAGE=$(jq -r '.message // "运行准备失败"' "$RUNTIME_RESPONSE" 2>/dev/null || echo "运行准备失败")
            echo "::error title=运行准备失败::$MESSAGE"
            exit 1
          fi
          chmod 600 "$RUNTIME_RESPONSE"
          python3 - "$RUNTIME_RESPONSE" "$RUNTIME_METADATA" "$RUNTIME_ARCHIVE" "toggl" <<'PY'
          import json
          import os
          import re
          import sys

          source, metadata_path, archive_path, expected_service = sys.argv[1:]
          raw = open(source, 'rb').read()
          magic = b'NHRB1\n'
          if not raw.startswith(magic) or len(raw) < len(magic) + 8:
              raise SystemExit('运行程序响应格式无效。')
          length_bytes = raw[len(magic):len(magic) + 8]
          if not re.fullmatch(rb'[0-9a-fA-F]{8}', length_bytes):
              raise SystemExit('运行配置长度无效。')
          metadata_length = int(length_bytes, 16)
          if metadata_length <= 0 or metadata_length > 1024 * 1024:
              raise SystemExit('运行配置超过大小限制。')
          metadata_start = len(magic) + 8
          metadata_end = metadata_start + metadata_length
          if metadata_end >= len(raw):
              raise SystemExit('运行程序响应不完整。')
          try:
              metadata = json.loads(raw[metadata_start:metadata_end].decode('utf-8'))
          except Exception:
              raise SystemExit('运行配置格式无效。')
          archive = raw[metadata_end:]
          if metadata.get('schemaVersion') != 1:
              raise SystemExit('运行配置版本不受支持。')
          if metadata.get('context', {}).get('service') != expected_service:
              raise SystemExit('运行配置与当前服务不匹配。')
          expected_size = metadata.get('bundle', {}).get('size')
          if not isinstance(expected_size, int) or expected_size != len(archive) or not archive or len(archive) > 64 * 1024 * 1024:
              raise SystemExit('运行程序大小校验失败。')
          for path, data in ((metadata_path, json.dumps(metadata, ensure_ascii=False, separators=(',', ':')).encode()), (archive_path, archive)):
              with open(path, 'wb') as handle:
                  handle.write(data)
              os.chmod(path, 0o600)
          PY
          ACCESS_TOKEN=$(jq -r '.accessToken // empty' "$RUNTIME_METADATA")
          REPORT_TOKEN=$(jq -r '.reportToken // empty' "$RUNTIME_METADATA")
          POLICY_ID=$(jq -r '.context.id // empty' "$RUNTIME_METADATA")
          PLAN=$(jq -r '.context.plan // empty' "$RUNTIME_METADATA")
          POLICY_JSON=$(jq -c '.policy // {}' "$RUNTIME_METADATA")
          POLICY_SIGNATURE=$(jq -r '.policySignature // empty' "$RUNTIME_METADATA")
          SERVICE_CONFIG=$(jq -c '.serviceConfig // empty' "$RUNTIME_METADATA")
          EXPECTED_SIZE=$(jq -r '.bundle.size // empty' "$RUNTIME_METADATA")
          EXPECTED_SHA256=$(jq -r '.bundle.sha256 // empty' "$RUNTIME_METADATA")
          if [ -z "$ACCESS_TOKEN" ] || [ -z "$REPORT_TOKEN" ] || [ -z "$POLICY_ID" ] || [ -z "$PLAN" ] || [ -z "$POLICY_SIGNATURE" ] || [ -z "$SERVICE_CONFIG" ] || [ -z "$EXPECTED_SIZE" ] || [ -z "$EXPECTED_SHA256" ]; then
            echo "::error title=运行准备失败::运行配置缺少必要字段。"
            exit 1
          fi
          for VALUE in "$ACCESS_TOKEN" "$REPORT_TOKEN" "$POLICY_SIGNATURE" "$SERVICE_CONFIG"; do echo "::add-mask::$VALUE"; done
          python3 - "$RUNTIME_METADATA" <<'PY'
          import json
          import sys
          metadata = json.load(open(sys.argv[1], encoding='utf-8'))
          for value in metadata.get('serviceConfig', {}).values():
              escaped = str(value).replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A')
              if len(escaped) >= 8:
                  print(f'::add-mask::{escaped}')
          PY
          ACTUAL_SIZE=$(wc -c < "$RUNTIME_ARCHIVE" | tr -d ' ')
          ACTUAL_SHA256=$(sha256sum "$RUNTIME_ARCHIVE" | awk '{print $1}')
          if [ "$ACTUAL_SIZE" != "$EXPECTED_SIZE" ] || [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "::error title=运行程序校验失败::下载内容的大小或 SHA-256 不匹配。"
            exit 1
          fi
          if tar -tzf "$RUNTIME_ARCHIVE" | grep -Eq '(^/|(^|/)\.\.(/|$))'; then
            echo "::error title=运行程序校验失败::运行程序包含不安全路径。"
            exit 1
          fi
          tar -xzf "$RUNTIME_ARCHIVE"
          test -f runner/requirements.txt
          test -d runner/notionhub_runner
          {
            echo "NOTIONHUB_RUN_ACCESS_TOKEN=$ACCESS_TOKEN"
            echo "NOTIONHUB_REPORT_TOKEN=$REPORT_TOKEN"
            echo "NOTIONHUB_POLICY_ID=$POLICY_ID"
            echo "SYNC_RUN_ID=$POLICY_ID"
            echo "SYNC_PLAN=$PLAN"
            echo "ENTITLEMENT_PLAN=$PLAN"
            echo "SYNC_POLICY_JSON=$POLICY_JSON"
            echo "SYNC_POLICY_SIGNATURE=$POLICY_SIGNATURE"
            echo "SYNC_POLICY_SIGNING_KEY=$ACCESS_TOKEN"
            echo 'TOGGL_CONFIG<<NOTIONHUB_CONFIG_EOF'
            echo "$SERVICE_CONFIG"
            echo 'NOTIONHUB_CONFIG_EOF'
          } >> "$GITHUB_ENV"
          echo "plan=$PLAN" >> "$GITHUB_OUTPUT"

      - name: 结算免费体验
        if: steps.finish_auth.outputs.settle_trial == 'true' && steps.authorize.outcome == 'success'
        run: |
          if [ "${{ steps.aggregate.outputs.status }}" = "success" ]; then STATUS=success; else STATUS=failure; fi
          cd runner
          python -m notionhub_runner report toggl --status "$STATUS" --state "${{ github.workspace }}/notionhub-state.json" --output "$RUNNER_TEMP/notionhub-settlement.json" --failure-class "${{ steps.aggregate.outputs.failure_class || 'platform' }}"
          curl --retry 3 --retry-all-errors -fsSL -X POST "$NOTIONHUB_API_BASE/internal/trial-runs/$NOTIONHUB_POLICY_ID/report"             -H "Authorization: Bearer $NOTIONHUB_REPORT_TOKEN" -H 'Content-Type: application/json' --data-binary "@$RUNNER_TEMP/notionhub-settlement.json" >/dev/null

      - name: 确认首次全量同步完成
        if: steps.finish_auth.outputs.complete_initial == 'true' && steps.authorize.outcome == 'success'
        run: |
          PAYLOAD=$(jq -cn --arg service "toggl" --arg repository "${{ github.repository }}" --arg run_id "${{ github.run_id }}" --arg requested "${{ steps.aggregate.outputs.requested_mode }}" --arg effective "${{ steps.aggregate.outputs.effective_mode }}" '{service:$service,repository:$repository,githubRunId:$run_id,status:"success",requestedMode:$requested,effectiveMode:$effective,initialFullSyncForced:true}')
          curl -fsSL -X POST "$NOTIONHUB_API_BASE/internal/initial-full-sync/complete"             -H "Authorization: Bearer $NOTIONHUB_RUN_ACCESS_TOKEN" -H 'Content-Type: application/json' --data "$PAYLOAD" >/dev/null

      - name: 生成运行摘要
        if: always()
        run: |
          case "${{ steps.aggregate.outputs.status }}" in
            success) RESULT="同步成功" ;;
            failure) RESULT="同步失败" ;;
            skipped) RESULT="未配置，已跳过" ;;
            *) RESULT="同步状态未知" ;;
          esac
          if [ "${{ github.event_name }}" = "schedule" ]; then TRIGGER="定时运行"; else TRIGGER="手动运行"; fi
          if [ "${{ steps.aggregate.outputs.effective_mode }}" = "full" ]; then MODE_LABEL="全量更新"; else MODE_LABEL="增量同步"; fi
          {
            echo "## Toggl同步"
            echo ""
            echo "| 项目 | 内容 |"
            echo "| --- | --- |"
            echo "| 结果 | $RESULT |"
            echo "| 模式 | $MODE_LABEL |"
            echo "| 辅助阶段警告 | ${{ steps.aggregate.outputs.warning_count || '0' }} |"
            if [ -f notionhub-final.json ]; then
              jq -r '.stages[] | [(.label // .jobKey), .status] | @tsv' notionhub-final.json | while IFS=$'	' read -r STAGE_LABEL STAGE_STATUS; do
                case "$STAGE_STATUS" in
                  success) STAGE_RESULT="成功" ;;
                  skipped) STAGE_RESULT="已跳过" ;;
                  warning) STAGE_RESULT="有警告" ;;
                  failure) STAGE_RESULT="失败" ;;
                  *) STAGE_RESULT="未知" ;;
                esac
                echo "| 阶段：$STAGE_LABEL | $STAGE_RESULT |"
              done
            fi
            echo "| 触发方式 | $TRIGGER |"
            echo "| 运行记录 | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 确认同步成功
        if: always()
        run: |
          if [ "${{ steps.aggregate.outputs.status }}" = "failure" ]; then exit 1; fi
